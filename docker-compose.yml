version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hermes_db
    environment:
      POSTGRES_USER: hermes_user
      POSTGRES_PASSWORD: hermes_password
      POSTGRES_DB: hermes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: hermes_vector_db
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
